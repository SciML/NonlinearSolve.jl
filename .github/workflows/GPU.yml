name: "GPU Tests"

on:
  pull_request:
    paths:
      - "src/**"
      - "ext/**"
      - "test/**"
      - "Project.toml"
      - "lib/SimpleNonlinearSolve/**"
      - "lib/NonlinearSolveBase/**"
      - ".github/workflows/GPU.yml"
  push:
    branches:
      - master

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ startsWith(github.ref, 'refs/pull/') }}

jobs:
  nonlinearsolve-cuda:
    name: "NonlinearSolve CUDA"
    runs-on: [self-hosted, gpu-v100]
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v6
      - uses: julia-actions/setup-julia@v3
        with:
          version: "1"
      - uses: julia-actions/julia-buildpkg@v1
      - uses: julia-actions/julia-runtest@v1
        env:
          GROUP: "cuda"
      - uses: julia-actions/julia-processcoverage@v1
        with:
          directories: src,ext
      - uses: codecov/codecov-action@v6
        with:
          files: lcov.info
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false

  simplenonlinearsolve-cuda:
    name: "SimpleNonlinearSolve CUDA"
    runs-on: [self-hosted, gpu-v100]
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v6
      - uses: julia-actions/setup-julia@v3
        with:
          version: "1"
      - run: |
          julia --project=lib/SimpleNonlinearSolve -e '
            using Pkg
            Pkg.develop([
              PackageSpec(path=joinpath(pwd(), "lib", "BracketingNonlinearSolve")),
              PackageSpec(path=joinpath(pwd(), "lib", "NonlinearSolveBase")),
              PackageSpec(path=joinpath(pwd(), "lib", "SciMLJacobianOperators")),
            ])
            Pkg.instantiate()'
      - uses: julia-actions/julia-runtest@v1
        with:
          project: lib/SimpleNonlinearSolve
        env:
          GROUP: "cuda"
      - uses: julia-actions/julia-processcoverage@v1
        with:
          directories: lib/SimpleNonlinearSolve/src,lib/SimpleNonlinearSolve/ext
      - uses: codecov/codecov-action@v6
        with:
          files: lcov.info
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false
