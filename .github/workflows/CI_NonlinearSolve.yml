name: CI (NonlinearSolve)

on:
  pull_request:
    paths:
      - "src/**"
      - "ext/**"
      - "test/**"
      - "Project.toml"
      - ".github/workflows/CI_NonlinearSolve.yml"
      - "lib/SciMLJacobianOperators/**"
      - "lib/BracketingNonlinearSolve/**"
      - "lib/NonlinearSolveBase/**"
      - "lib/SimpleNonlinearSolve/**"
      - "lib/NonlinearSolveFirstOrder/**"
      - "lib/NonlinearSolveSpectralMethods/**"
      - "lib/NonlinearSolveQuasiNewton/**"
  push:
    branches:
      - master

concurrency:
  # Skip intermediate builds: always.
  # Cancel intermediate builds: only if it is a pull request build.
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ startsWith(github.ref, 'refs/pull/') }}

jobs:
  test:
    name: "Tests"
    strategy:
      fail-fast: false
      matrix:
        group:
          - core
          - downstream
          - wrappers
          - misc
          - nopre
          - trim
        version:
          - "1"
          - "1.11"
          - "lts"
        os:
          - ubuntu-latest
          - macos-latest
        exclude:
          # Don't run trim tests on Julia versions below 1.12
          - group: trim
            version: "1.11"
          - group: trim
            version: "lts"
    uses: "SciML/.github/.github/workflows/tests.yml@v1"
    with:
      julia-version: "${{ matrix.version }}"
      group: "${{ matrix.group }}"
      os: "${{ matrix.os }}"
      project: "."
    secrets: "inherit"
